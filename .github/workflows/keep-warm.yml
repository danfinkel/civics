# Pings the Hugging Face Space so it is less likely to go fully cold
# during US business hours. Update the URL if the Space name changes.
name: Keep HF Space warm

on:
  schedule:
    # ~Every 30 minutes, 13:00–23:59 UTC ≈ 8am–6pm US Eastern (varies with DST)
    - cron: "25,55 * 13-23 * * 1-5"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /health
        run: |
          set -e
          curl -sSf "https://danfinkel-civiclens.hf.space/health" | head -c 500
          echo
