name: civiclens
description: Privacy-first civic document intelligence for Massachusetts residents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.3
  path_provider: ^2.1.2
  path: ^1.9.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # MediaPipe for on-device inference
  mediapipe_genai: ^0.1.0

  # For blur detection
  google_mlkit_commons: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
