name: civiclens
description: Privacy-first civic document intelligence for Massachusetts residents
publish_to: 'none'
version: 1.0.4+14

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.3
  path_provider: ^2.1.2
  path: ^1.9.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2

  # HTTP client for cloud fallback and model download
  http: ^1.2.0

  # Crypto for checksum verification
  crypto: ^3.0.3

  # llama.cpp for on-device inference (replaces deprecated MediaPipe)
  # Vendored with patched FFI structs for llama.cpp commit d9a12c82f (Gemma 4 support)
  # See mobile/ARCHITECTURE.md "Challenge 3" for why this is vendored
  llama_cpp_dart:
    path: ./packages/llama_cpp_dart

  # Google ML Kit for on-device OCR
  google_mlkit_text_recognition: ^0.13.0

  # Eval server (EVAL_MODE only; drives Monte Carlo harness from Mac)
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # System share sheet (packet summary)
  share_plus: ^10.1.4

  # App version label (Settings / About)
  package_info_plus: ^8.1.2

  # For blur detection (not needed - using image package instead)
  # google_mlkit_commons: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: false
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/placeholder/
    - assets/test_docs/
