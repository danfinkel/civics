name: civiclens
description: Privacy-first civic document intelligence for Massachusetts residents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.3
  path_provider: ^2.1.2
  path: ^1.9.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2

  # HTTP client for cloud fallback and model download
  http: ^1.2.0

  # Crypto for checksum verification
  crypto: ^3.0.3

  # llama.cpp for on-device inference (replaces deprecated MediaPipe)
  llama_cpp_dart: ^0.0.5

  # Google ML Kit for on-device OCR
  google_mlkit_text_recognition: ^0.13.0

  # For blur detection (not needed - using image package instead)
  # google_mlkit_commons: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
