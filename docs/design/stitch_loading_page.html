<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CivicLens | Digital Architect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#2f3033",
                      "inverse-primary": "#abc9f2",
                      "on-tertiary-fixed": "#291800",
                      "surface-tint": "#436084",
                      "primary-container": "#1a3a5c",
                      "on-secondary-container": "#5a6575",
                      "on-primary-container": "#87a4cc",
                      "primary": "#002444",
                      "outline-variant": "#c3c6cf",
                      "outline": "#73777f",
                      "primary-fixed": "#d2e4ff",
                      "on-secondary": "#ffffff",
                      "surface-container-low": "#f4f3f6",
                      "on-secondary-fixed-variant": "#3d4756",
                      "surface-variant": "#e3e2e5",
                      "on-error-container": "#93000a",
                      "error-container": "#ffdad6",
                      "inverse-on-surface": "#f1f0f3",
                      "on-secondary-fixed": "#111c29",
                      "tertiary": "#331f00",
                      "secondary": "#545f6f",
                      "on-tertiary-fixed-variant": "#5f410c",
                      "on-background": "#1a1c1e",
                      "on-error": "#ffffff",
                      "tertiary-container": "#4f3300",
                      "secondary-fixed": "#d8e3f6",
                      "secondary-container": "#d8e3f6",
                      "background": "#faf9fc",
                      "secondary-fixed-dim": "#bcc7d9",
                      "tertiary-fixed-dim": "#ecbf80",
                      "surface-container-high": "#e9e8eb",
                      "on-surface": "#1a1c1e",
                      "surface-container-highest": "#e3e2e5",
                      "surface": "#faf9fc",
                      "primary-fixed-dim": "#abc9f2",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#dad9dd",
                      "surface-bright": "#faf9fc",
                      "surface-container": "#eeedf1",
                      "tertiary-fixed": "#ffddb1",
                      "on-surface-variant": "#43474e",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#c49b5f",
                      "on-primary-fixed-variant": "#2a486b",
                      "on-primary": "#ffffff",
                      "error": "#ba1a1a",
                      "on-primary-fixed": "#001c37"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk"],
                      "body": ["Public Sans"],
                      "label": ["Public Sans"]
              }
            },
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .geometric-grid {
            background-image: 
                radial-gradient(circle at 1px 1px, rgba(163, 201, 242, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .guiding-light-glow {
            box-shadow: 0 0 80px 20px rgba(236, 191, 128, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body bg-primary text-on-primary-fixed overflow-hidden">
<!-- Loading Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-primary overflow-hidden">
<!-- Background Architectural Layer -->
<div class="absolute inset-0 geometric-grid opacity-30"></div>
<div class="absolute inset-0 bg-gradient-to-b from-primary via-primary-container/40 to-primary"></div>
<!-- Top Visual Accent -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-[radial-gradient(circle_at_50%_0%,rgba(67,96,132,0.15),transparent_70%)]"></div>
<!-- Central 3D Icon Construct -->
<div class="relative z-10 flex flex-col items-center">
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Outer Navy Glass Layer (Geometric Prism) -->
<div class="absolute inset-0 rotate-12 bg-primary-container/40 backdrop-blur-xl rounded-[3rem] border border-white/5 transform scale-95"></div>
<!-- Secondary Navy Glass Layer (Shifted) -->
<div class="absolute inset-0 -rotate-6 bg-primary-container/30 backdrop-blur-lg rounded-[3rem] border border-white/10"></div>
<!-- The Core: The Stylized Lens -->
<div class="relative w-48 h-48 md:w-56 md:h-56 bg-gradient-to-br from-primary-container to-primary rounded-full flex items-center justify-center overflow-hidden border border-white/10 shadow-2xl">
<!-- Internal Glass Detail -->
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<!-- The Guiding Light (Amber Core) -->
<div class="relative z-20 w-16 h-16 md:w-20 md:h-20 bg-gradient-to-tr from-[#ecbf80] to-[#c49b5f] rounded-full guiding-light-glow flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="light_mode" style="font-variation-settings: 'FILL' 1;">light_mode</span>
</div>
<!-- Lens Refractions -->
<div class="absolute top-4 left-4 w-12 h-12 bg-white/10 rounded-full blur-md"></div>
<div class="absolute bottom-8 right-8 w-24 h-24 bg-[#abc9f2]/5 rounded-full blur-xl"></div>
</div>
</div>
<!-- Sleek Progress Indicator -->
<div class="mt-16 w-48 h-1 bg-white/5 rounded-full overflow-hidden relative">
<!-- Amber Progress Line -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-[#ecbf80] to-transparent w-full"></div>
</div>
</div>
<!-- Branding & Identity -->
<div class="absolute bottom-12 z-10 flex flex-col items-center">
<!-- Wordmark -->
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[#ecbf80]" data-icon="account_balance" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<h1 class="text-3xl font-headline font-bold text-white tracking-tighter">CivicLens</h1>
</div>
<!-- Tagline -->
<p class="text-on-primary-container text-sm font-medium tracking-[0.2em] uppercase font-label">
                Your Digital Architect for Civic Life
            </p>
</div>
<!-- Atmospheric Grain Overlays -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
</main>
<!-- Hidden Nav Shell Suppression (As per mandate for non-top-level destinations) -->
<!-- This screen is a loading state, thus TopAppBar and BottomNavBar are suppressed to prioritize focus -->
</body></html>
