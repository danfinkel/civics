<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>CivicLens — Transition Cards (Dark)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0A1628;
    width: 1920px;
  }
  .slide {
    width: 1920px;
    height: 1080px;
    background: #0A1628;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 280px;
    position: relative;
    overflow: hidden;
    border-bottom: 2px dashed rgba(255,255,255,0.05);
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(20,60,100,0.22) 0%, rgba(10,22,40,0) 70%);
    top: -60px;
    left: -60px;
    pointer-events: none;
  }
  .wordmark {
    position: absolute;
    top: 64px;
    left: 280px;
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.20);
    letter-spacing: 1px;
  }
  .accent {
    width: 56px;
    height: 5px;
    background: #5DB8A0;
    border-radius: 3px;
    margin-bottom: 52px;
    position: relative;
    z-index: 1;
  }
  /* Analysis transition */
  .line1-at {
    font-size: 104px;
    font-weight: 600;
    color: #5DB8A0;
    line-height: 1.05;
    letter-spacing: -3px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .line2-at {
    font-size: 104px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.05;
    letter-spacing: -3px;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }
  .line3-at {
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.40);
    position: relative;
    z-index: 1;
  }
  /* So we built it */
  .built-text {
    font-size: 108px;
    font-weight: 400;
    font-style: italic;
    color: #ffffff;
    letter-spacing: -3px;
    position: relative;
    z-index: 1;
  }
  .built-period { color: #5DB8A0; }
  .star {
    position: absolute;
    bottom: 52px;
    right: 80px;
    opacity: 0.08;
  }
  .slide-label {
    position: absolute;
    bottom: 44px;
    right: 280px;
    font-size: 16px;
    color: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<!-- Analysis transition: "15 seconds. Zero hallucinations." -->
<div class="slide">
  <div class="glow"></div>
  <div class="wordmark">CivicLens</div>
  <div class="accent"></div>
  <div class="line1-at">15 seconds.</div>
  <div class="line2-at">Zero hallucinations.</div>
  <div class="line3-at">Here's what it took to get there.</div>
  <div class="slide-label">analysis transition</div>
  <svg class="star" width="44" height="44" viewBox="0 0 44 44" fill="white"><path d="M22 0 L24.2 19.8 L44 22 L24.2 24.2 L22 44 L19.8 24.2 L0 22 L19.8 19.8 Z"/></svg>
</div>

<!-- So we built it -->
<div class="slide">
  <div class="glow"></div>
  <div class="wordmark">CivicLens</div>
  <div class="built-text">So we built it<span class="built-period">.</span></div>
  <div class="slide-label">demo transition</div>
  <svg class="star" width="44" height="44" viewBox="0 0 44 44" fill="white"><path d="M22 0 L24.2 19.8 L44 22 L24.2 24.2 L22 44 L19.8 24.2 L0 22 L19.8 19.8 Z"/></svg>
</div>

</body>
</html>
