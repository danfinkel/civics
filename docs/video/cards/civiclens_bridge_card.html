<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>CivicLens — Bridge Card (Dark)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0A1628;
    width: 1920px;
  }
  .slide {
    width: 1920px;
    height: 1080px;
    background: #0A1628;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 280px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(25,65,105,0.25) 0%, rgba(10,22,40,0) 70%);
    top: -60px;
    left: -60px;
    pointer-events: none;
  }
  .wordmark {
    position: absolute;
    top: 64px;
    left: 280px;
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.22);
    letter-spacing: 1px;
  }
  .line1 {
    font-size: 72px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    line-height: 1.2;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .line2 {
    font-size: 72px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .accent {
    width: 56px;
    height: 5px;
    background: #5DB8A0;
    border-radius: 3px;
    margin-top: 48px;
    position: relative;
    z-index: 1;
  }
  .star {
    position: absolute;
    bottom: 52px;
    right: 80px;
    opacity: 0.10;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="glow"></div>
  <div class="wordmark">CivicLens</div>
  <div class="line1">That problem plays out every day —</div>
  <div class="line2">at a much higher cost.</div>
  <div class="accent"></div>
  <svg class="star" width="44" height="44" viewBox="0 0 44 44" fill="white"><path d="M22 0 L24.2 19.8 L44 22 L24.2 24.2 L22 44 L19.8 24.2 L0 22 L19.8 19.8 Z"/></svg>
</div>
</body>
</html>
