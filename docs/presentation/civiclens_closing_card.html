<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>CivicLens — Closing Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0A1628;
    width: 1920px;
  }

  .slide {
    width: 1920px;
    height: 1080px;
    background: #0A1628;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 120px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial glow behind icon — matches icon's own ambient light */
  .glow {
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30,80,120,0.35) 0%, rgba(10,22,40,0) 70%);
    left: 160px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  /* Left: icon */
  .icon-wrap {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .icon-wrap img {
    width: 480px;
    height: 480px;
    object-fit: cover;
    border-radius: 108px; /* iOS icon rounding at this size */
    display: block;
  }

  /* Right: text */
  .text-wrap {
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .app-name {
    font-size: 96px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1.0;
    margin-bottom: 24px;
  }

  .tagline {
    font-size: 40px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
    margin-bottom: 64px;
    font-style: italic;
  }

  /* URL links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .link-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .link-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  .link-text {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.01em;
  }

  .link-text.highlight {
    color: #5DB8A0;
    opacity: 1;
  }

  /* Divider between name and links */
  .divider {
    width: 64px;
    height: 4px;
    background: #5DB8A0;
    border-radius: 2px;
    margin-bottom: 56px;
  }

  /* Four-pointed star accent — echoing the icon */
  .star {
    position: absolute;
    bottom: 56px;
    right: 80px;
    opacity: 0.3;
  }

  /* Built with line */
  .built-with {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="glow"></div>

  <!-- Icon -->
  <div class="icon-wrap">
    <img src="../../mobile/assets/branding/app_icon.png" alt="CivicLens icon">
  </div>

  <!-- Text -->
  <div class="text-wrap">
    <div class="app-name">CivicLens</div>
    <div class="divider"></div>
    <div class="tagline">The check you do at home,<br>before you go.</div>

    <div class="links">
      <div class="link-row">
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        <div class="link-text">github.com/danfinkel/civics</div>
      </div>
      <div class="link-row">
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <div class="link-text">DanFinkel-civiclens.hf.space</div>
      </div>
      <div class="link-row">
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="#5DB8A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <div class="link-text highlight">On-device · Private · Open source</div>
      </div>
    </div>
  </div>

  <!-- Star accent -->
  <svg class="star" width="40" height="40" viewBox="0 0 40 40" fill="white">
    <path d="M20 0 L22 18 L40 20 L22 22 L20 40 L18 22 L0 20 L18 18 Z"/>
  </svg>

  <!-- Built with -->
  <div class="built-with">Built with Gemma 4 E2B &nbsp;·&nbsp; Gemma 4 Good Hackathon 2026</div>

</div>
</body>
</html>
